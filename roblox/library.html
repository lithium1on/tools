<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>lithium's tools - library</title>
  <link rel="icon" href="https://lithium.wtf/assets/img/icon.png">
  <meta property="theme-color" content="#696969">
  <style>
    h1 { font-size: 3rem; margin: 0rem 0; }
    h2 { font-size: 1.5rem; margin: 0.3rem 0; }
    p { margin: 0.2rem 0; }
    #grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
      margin-top: 8px;
      padding: 0 6px;
      box-sizing: border-box;
    }
    #grid img {
      display: block;
      box-sizing: border-box;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      background-color: #eee;
      background-image:
        linear-gradient(45deg, #ccc 25%, transparent 25%),
        linear-gradient(-45deg, #ccc 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #ccc 75%),
        linear-gradient(-45deg, transparent 75%, #ccc 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      border: 1px solid #555;
      cursor: pointer;
    }
    #grid img.copied { border-color: #6c6; }
    @media (max-width: 700px) {
      #grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
<header>
  <section id="title">
    <h1>lithium's tools</h1>
  </section>
  <nav>
    <a href="/">home</a> |
    <a href="/roblox/help">help</a>
  </nav>
  <hr>
</header>
<main>
  <section id="library">
    <h2>library <span id="accountLabel" style="color:gray;font-size:1rem"></span></h2>
    <p>click an image to copy its asset id</p>
    <div id="grid"></div>
    <pre id="log"></pre>
  </section>
</main>
<script>
var logEl = document.getElementById("log");
function log(msg) { logEl.appendChild(document.createTextNode(msg + "\n")); }

var gridEl = document.getElementById("grid");
var accountLabel = document.getElementById("accountLabel");

var params = new URLSearchParams(location.search);
var account = params.get("account");

if (!account) {
  log("no account specified. go back and use the library button from the uploader.");
} else {
  accountLabel.textContent = "(" + account + ")";
  run(account);
}

function copyToClipboard(text, imgEl) {
  navigator.clipboard.writeText(text).then(function() {
    imgEl.classList.add("copied");
    setTimeout(function() { imgEl.classList.remove("copied"); }, 400);
    log("copied " + text);
  }).catch(function(e) {
    log("couldn't copy: " + e.message);
  });
}

function addThumbnail(assetId, imageUrl) {
  var img = document.createElement("img");
  img.src = imageUrl;
  img.title = assetId;
  img.alt = assetId;
  img.addEventListener("click", function() { copyToClipboard(assetId, img); });
  gridEl.appendChild(img);
}

async function getAccountCreds(name) {
  var savedAccounts = {};
  try { var stored = localStorage.getItem("savedAccounts"); if (stored) savedAccounts = JSON.parse(stored); } catch(e) {}
  return savedAccounts[name] || null;
}

async function fetchInventoryModels(userId) {
  var candidates = [];
  var cursor = "";
  var MAX_PAGES = 50;
  for (var page = 0; page < MAX_PAGES; page++) {
    var url = "https://api.lithium.wtf/roblox/inventory/v2/users/" + userId
      + "/inventory?assetTypes=Model&limit=100&sortOrder=Asc"
      + (cursor ? "&cursor=" + encodeURIComponent(cursor) : "");
    var res = await fetch(url);
    if (!res.ok) throw new Error("http " + res.status);
    var data = await res.json();
    if (data.errors && data.errors.length) {
      var err = data.errors[0];
      if (err.code === 4 || /not authorized/i.test(err.message || "")) {
        throw new Error("PRIVATE_INVENTORY");
      }
      throw new Error(err.message || "inventory api error");
    }
    (data.data || []).forEach(function(item) {
      if (item.name === "img") candidates.push(String(item.assetId));
    });
    if (!data.nextPageCursor) break;
    cursor = data.nextPageCursor;
  }
  return candidates;
}

async function fetchThumbnails(assetIds) {
  var results = {};
  var CHUNK = 100;
  for (var i = 0; i < assetIds.length; i += CHUNK) {
    var chunk = assetIds.slice(i, i + CHUNK);
    var url = "https://api.lithium.wtf/roblox/thumbnails/v1/assets?assetIds="
      + chunk.join(",") + "&size=420x420&format=Png&isCircular=false";
    var res = await fetch(url);
    if (!res.ok) { log("thumbnail batch failed: http " + res.status); continue; }
    var data = await res.json();
    (data.data || []).forEach(function(item) {
      results[String(item.targetId)] = item;
    });
  }
  return results;
}

function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

async function loadThumbnails(assetIds) {
  var pending = assetIds.slice();
  var MAX_ATTEMPTS = 15;
  for (var attempt = 1; attempt <= MAX_ATTEMPTS && pending.length; attempt++) {
    var thumbs = await fetchThumbnails(pending);
    var stillPending = [];
    pending.forEach(function(id) {
      var t = thumbs[id];
      if (t && t.state === "Completed" && t.imageUrl) {
        addThumbnail(id, t.imageUrl);
      } else if (t && t.state === "Error") {
        log("thumbnail errored for " + id);
      } else {
        stillPending.push(id);
      }
    });
    pending = stillPending;
    if (pending.length && attempt < MAX_ATTEMPTS) {
      log("waiting on " + pending.length + " thumbnail(s) to render, retrying...");
      await sleep(2000);
    }
  }
  if (pending.length) {
    log(pending.length + " thumbnail(s) still not ready after retrying, refresh the page later to check again.");
  }
}

async function run(accountName) {
  var acc = await getAccountCreds(accountName);
  if (!acc) {
    log("no saved credentials found for \"" + accountName + "\". go back to the uploader and save credentials for this account first.");
    return;
  }
  log("scanning inventory...");
  var candidates;
  try {
    candidates = await fetchInventoryModels(acc.userId);
  } catch (e) {
    if (e.message === "PRIVATE_INVENTORY") {
      log("this account's inventory is set to private, so it can't be read. the account owner needs to set inventory visibility to public in their roblox privacy settings.");
    } else {
      log("inventory scan failed: " + e.message);
    }
    return;
  }
  if (!candidates.length) {
    log("no models named \"img\" found in this account's inventory.");
    return;
  }
  log("fetching thumbnails for " + candidates.length + " model(s)...");
  await loadThumbnails(candidates);
  log("done.");
}
</script>
</body>

</html>
