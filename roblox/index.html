<!DOCTYPE html>
<noscript><meta http-equiv="refresh" content="0; url=https://lithium.wtf/noscript"></noscript>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>lithium's tools</title>
  <link rel="icon" href="https://lithium.wtf/assets/img/icon.png">
  <meta property="og:title" content="lithium's tools">
  <meta property="og:description" content="lithium's tools wow">
  <meta property="og:url" content="https://tools.lithium.wtf/">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://lithium.wtf/assets/img/icon.png">
  <meta property="theme-color" content="#696969">
  <style>
    h1 { font-size: 3rem; margin: 0rem 0; }
    h2 { font-size: 1.5rem; margin: 0.3rem 0; }
    ul { margin: 0rem 0; padding-left: 1.7rem; }
    li { margin: 0rem 0; }
    li span { color: gray; font-size: 0.9rem; }
    p { margin: 0.2rem 0; }
    input, button, select { display: block; margin-bottom: 3px; }
  </style>
</head>
<body>
<header>
  <section id="title">
    <h1>lithium's tools</h1>
  </section>
  <nav>
    <a href="https://tools.lithium.wtf/#about">about</a> |
    <a href="https://tools.lithium.wtf/#tools">tools</a>
  </nav>
  <hr>
</header>
<main>
  <section id="uploader">
    <h2>lithium's image uploader</h2>
    <div style="display:flex;align-items:center">
      <input type="password" id="apiKey" placeholder="* api key" size="40">
      <select id="accountSelect" style="display:none"></select>
      <button onclick="location.href='/roblox/help'" style="margin-left:3px;width:21px;height:21px;padding:0;cursor:pointer">?</button>
    </div>
    <input type="text" id="userId" placeholder="* username or user id" size="40">
    <label id="saveCredsLabel" style="display:flex;align-items:center;gap:4px;margin-bottom:3px">
      <input type="checkbox" id="saveCreds" style="display:inline;margin:0;width:auto">
      save credentials
    </label>
    <select id="quality">
      <option value="400">higher quality - 400p</option>
      <option value="360" selected>high quality - 360p</option>
      <option value="240">medium quality - 240p</option>
      <option value="180">low quality - 180p</option>
    </select>
    <input type="file" id="imageFile" accept="image/*">
    <div style="display:flex;gap:3px">
      <button onclick="run()" style="cursor:pointer">upload</button>
      <button onclick="goToLibrary()" style="cursor:pointer">library</button>
    </div>
    <br>
    <pre id="log"></pre>
    <script>
var logEl = document.getElementById("log");
function log(msg) { logEl.appendChild(document.createTextNode(msg + "\n")); }
function clearLog() { logEl.innerHTML = ""; }

var apiKeyInput = document.getElementById("apiKey");
var userIdInput = document.getElementById("userId");
var saveCredsCheckbox = document.getElementById("saveCreds");
var saveCredsLabel = document.getElementById("saveCredsLabel");
var accountSelect = document.getElementById("accountSelect");

function matchFormFont() {
  var formFont = getComputedStyle(apiKeyInput);
  saveCredsLabel.style.fontFamily = formFont.fontFamily;
  saveCredsLabel.style.fontSize = formFont.fontSize;
  saveCredsLabel.style.fontWeight = formFont.fontWeight;
}
matchFormFont();
window.addEventListener("load", matchFormFont);
if (document.fonts && document.fonts.ready) document.fonts.ready.then(matchFormFont);

var savedAccounts = {};
try { var storedAccounts = localStorage.getItem("savedAccounts"); if (storedAccounts) savedAccounts = JSON.parse(storedAccounts); } catch(e) {}

function persistAccounts() {
  try { localStorage.setItem("savedAccounts", JSON.stringify(savedAccounts)); } catch(e) {}
}

function buildAccountOptions(selected) {
  accountSelect.innerHTML = "";
  Object.keys(savedAccounts).forEach(function(name) {
    var opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    accountSelect.appendChild(opt);
  });
  var newOpt = document.createElement("option");
  newOpt.value = "__new__";
  newOpt.textContent = "new...";
  accountSelect.appendChild(newOpt);
  if (selected && savedAccounts[selected]) accountSelect.value = selected;
}

function applyAccount(name) {
  var acc = savedAccounts[name];
  if (!acc) return;
  apiKeyInput.value = acc.apiKey;
  userIdInput.value = acc.userId;
}

function showAccountDropdown(selected) {
  buildAccountOptions(selected);
  accountSelect.style.width = apiKeyInput.offsetWidth + "px";
  accountSelect.style.height = "21px";
  accountSelect.style.boxSizing = "border-box";
  accountSelect.style.padding = "0 2px";
  apiKeyInput.style.display = "none";
  userIdInput.style.display = "none";
  accountSelect.style.display = "block";
  if (accountSelect.value !== "__new__") applyAccount(accountSelect.value);
}

function hideAccountDropdown() {
  accountSelect.style.display = "none";
  apiKeyInput.style.display = "block";
  userIdInput.style.display = "block";
}

saveCredsCheckbox.addEventListener("change", function() {
  if (saveCredsCheckbox.checked) {
    var apiKeyVal = apiKeyInput.value.trim();
    var userVal = userIdInput.value.trim();
    if (apiKeyVal && userVal) {
      resolveUserId(userVal).then(function(resolvedId) {
        savedAccounts[userVal] = { apiKey: apiKeyVal, userId: resolvedId };
        persistAccounts();
      }).catch(function(e) {
        log("couldn't resolve user id: " + e.message);
      });
    }
    if (Object.keys(savedAccounts).length > 0) {
      showAccountDropdown(userVal && savedAccounts[userVal] ? userVal : Object.keys(savedAccounts)[0]);
    }
  } else {
    hideAccountDropdown();
  }
});

accountSelect.addEventListener("change", function() {
  if (accountSelect.value === "__new__") {
    apiKeyInput.value = "";
    userIdInput.value = "";
    hideAccountDropdown();
  } else {
    applyAccount(accountSelect.value);
  }
});

if (Object.keys(savedAccounts).length > 0) {
  saveCredsCheckbox.checked = true;
  showAccountDropdown(Object.keys(savedAccounts)[0]);
}

var usernameCache = {};
try { var stored = localStorage.getItem("usernameCache"); if (stored) usernameCache = JSON.parse(stored); } catch(e) {}

async function resolveUserId(input) {
  input = input.trim();
  if (/^\d+$/.test(input)) return input;
  var key = input.toLowerCase();
  if (usernameCache[key]) {
    log("found in cache!");
    return usernameCache[key];
  }
  log("looking up username: " + input + "...");
  var res = await fetch("https://api.lithium.wtf/roblox/userid/" + encodeURIComponent(input));
  if (!res.ok) throw new Error("username lookup failed: http " + res.status);
  var data = await res.json();
  if (!data.ok) throw new Error("username lookup failed: " + data.error);
  usernameCache[key] = String(data.id);
  try { localStorage.setItem("usernameCache", JSON.stringify(usernameCache)); } catch(e) {}
  return usernameCache[key];
}

function parseImage(arrayBuffer) {
  return new Promise(function(resolve, reject) {
    var blob = new Blob([arrayBuffer]);
    var url = URL.createObjectURL(blob);
    var img = new Image();
    img.onload = function() {
      var MAX_DIM = parseInt(document.getElementById("quality").value, 10);
      var scale = Math.min(1, MAX_DIM / Math.max(img.width, img.height));
      var scaledW = Math.round(img.width * scale);
      var scaledH = Math.round(img.height * scale);
      var canvas = document.createElement("canvas");
      canvas.width = scaledW;
      canvas.height = scaledH;
      var ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      ctx.drawImage(img, 0, 0, scaledW, scaledH);
      var d = ctx.getImageData(0, 0, scaledW, scaledH).data;
      var pixels = [];
      var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      // Full transparency support: keep any meaningfully-visible pixel and carry
      // its alpha through so the exporter can set a per-part Transparency value
      // instead of a hard opaque/invisible cutoff. MIN_ALPHA filters out the
      // near-zero-alpha noise that image resizing/anti-aliasing leaves along
      // edges — without it that noise still counts as "visible" and shows up
      // as a faint border line of almost-transparent parts.
      var MIN_ALPHA = 12;
      for (var y = 0; y < scaledH; y++)
        for (var x = 0; x < scaledW; x++) {
          var i = (scaledW * y + x) * 4;
          var a = d[i+3];
          if (a > MIN_ALPHA) {
            pixels.push({ x:x, y:y, r:d[i], g:d[i+1], b:d[i+2], a:a });
            if (x < minX) minX = x;
            if (x > maxX) maxX = x;
            if (y < minY) minY = y;
            if (y > maxY) maxY = y;
          }
        }
      URL.revokeObjectURL(url);
      if (!pixels.length) { reject(new Error("image has no visible content")); return; }
      // Center on the actual visible content, not the full (possibly padded) canvas.
      var centerX = (minX + maxX + 1) / 2;
      var centerY = (minY + maxY + 1) / 2;
      var contentW = maxX - minX + 1;
      var contentH = maxY - minY + 1;
      resolve({ pixels:pixels, scaledW:scaledW, scaledH:scaledH, contentW:contentW, contentH:contentH, centerX:centerX, centerY:centerY, origW:img.width, origH:img.height });
    };
    img.onerror = function() { reject(new Error("failed to load image")); };
    img.src = url;
  });
}

function buildBinary(pixels, scaledW, scaledH, name, desc) {
  function toRobloxFloat(f) {
    var view = new DataView(new ArrayBuffer(4));
    view.setFloat32(0, f, false);
    var n = view.getUint32(0, false);
    var rotated = ((n << 1) | (n >>> 31)) >>> 0;
    view.setUint32(0, rotated, false);
    return new Uint8Array(view.buffer);
  }
  function zigzag(n) { return ((n << 1) ^ (n >> 31)) >>> 0; }
  function interleave(arrays) {
    var n = arrays.length;
    var out = new Uint8Array(n * 4);
    for (var b = 0; b < 4; b++)
      for (var i = 0; i < n; i++)
        out[b * n + i] = arrays[i][b];
    return out;
  }
  function encodeFloats(arr) { return interleave(arr.map(toRobloxFloat)); }
  function encodeInts(arr) {
    return interleave(arr.map(function(n) {
      var v = new DataView(new ArrayBuffer(4));
      v.setUint32(0, zigzag(n), false);
      return new Uint8Array(v.buffer);
    }));
  }
  function encodeRefs(refs) {
    var deltas = refs.map(function(r, i) { return r - (i === 0 ? 0 : refs[i-1]); });
    return encodeInts(deltas);
  }
  function encodeStr(s) {
    var sb = new TextEncoder().encode(s);
    var lb = new Uint8Array(4);
    new DataView(lb.buffer).setUint32(0, sb.length, true);
    return concat([lb, sb]);
  }
  function u32LE(n) {
    var b = new Uint8Array(4);
    new DataView(b.buffer).setUint32(0, n >>> 0, true);
    return b;
  }
  function i32LE(n) {
    var b = new Uint8Array(4);
    new DataView(b.buffer).setInt32(0, n, true);
    return b;
  }
  function concat(arrays) {
    var total = arrays.reduce(function(s, a) { return s + a.length; }, 0);
    var out = new Uint8Array(total);
    var pos = 0;
    arrays.forEach(function(a) { out.set(a, pos); pos += a.length; });
    return out;
  }
  function makeChunk(name, data) {
    var nameBuf = new TextEncoder().encode(name.padEnd(4, '\0').slice(0,4));
    return concat([nameBuf, u32LE(0), u32LE(data.length), u32LE(0), data]);
  }
  function makeINST(classId, className, refs) {
    return makeChunk('INST', concat([u32LE(classId), encodeStr(className), new Uint8Array([0]), u32LE(refs.length), encodeRefs(refs)]));
  }
  function makePROP(classId, propName, typeId, valuesBuf) {
    return makeChunk('PROP', concat([u32LE(classId), encodeStr(propName), new Uint8Array([typeId]), valuesBuf]));
  }
  function propString(cid, pn, vals) { return makePROP(cid, pn, 0x01, concat(vals.map(encodeStr))); }
  function propBool(cid, pn, vals) { return makePROP(cid, pn, 0x02, new Uint8Array(vals.map(function(v){ return v?1:0; }))); }
  function propEnum(cid, pn, vals) {
    return makePROP(cid, pn, 0x12, interleave(vals.map(function(v){
      var b = new DataView(new ArrayBuffer(4)); b.setUint32(0, v, false); return new Uint8Array(b.buffer);
    })));
  }
  function propFloat(cid, pn, vals) { return makePROP(cid, pn, 0x04, encodeFloats(vals)); }
  function propVector3(cid, pn, xs, ys, zs) { return makePROP(cid, pn, 0x0e, concat([encodeFloats(xs), encodeFloats(ys), encodeFloats(zs)])); }
  function propCFrame(cid, pn, xs, ys, zs) {
    var ids = new Uint8Array(xs.length); ids.fill(0x02);
    return makePROP(cid, pn, 0x10, concat([ids, encodeFloats(xs), encodeFloats(ys), encodeFloats(zs)]));
  }
  function propColor3u8(cid, pn, colors) {
    return makePROP(cid, pn, 0x1a, concat([
      new Uint8Array(colors.map(function(c){ return c.r; })),
      new Uint8Array(colors.map(function(c){ return c.g; })),
      new Uint8Array(colors.map(function(c){ return c.b; }))
    ]));
  }
  var S = 0.05;
  var partRefs = pixels.map(function(_, i){ return 2 + i; });
  var fov = 70;
  var dist = Math.max(scaledW, scaledH) * S / (2 * Math.tan((fov/2) * Math.PI / 180)) + S * 2;
  var posX = pixels.map(function(px){ return (px.x - scaledW/2) * S; });
  var posY = pixels.map(function(px){ return (-px.y + scaledH/2) * S; });
  var posZ = pixels.map(function(){ return 0; });
  var colors = pixels.map(function(px){ return { r:px.r, g:px.g, b:px.b }; });
  // Full transparency support: derive a per-part Transparency float from
  // the source alpha channel instead of treating pixels as fully opaque.
  var transparencies = pixels.map(function(px){ return 1 - px.a / 255; });
  var childRefs = partRefs.concat([1, 0]);
  var parentRefs = partRefs.map(function(){ return 0; }).concat([0, -1]);
  var magic = new Uint8Array([0x3c,0x72,0x6f,0x62,0x6c,0x6f,0x78,0x21,0x89,0xff,0x0d,0x0a,0x1a,0x0a]);
  return concat([
    concat([magic, new Uint8Array([0,0]), i32LE(3), i32LE(1 + 1 + pixels.length), new Uint8Array(8)]),
    makeINST(0, 'Model',  [0]),
    makeINST(1, 'Camera', [1]),
    makeINST(2, 'Part',   partRefs),
    propString(0, 'Name',          [name]),
    propString(0, 'Description',   [desc]),
    propString(1, 'Name',          ['ThumbnailCamera']),
    propFloat( 1, 'FieldOfView',   [fov]),
    propCFrame(1, 'CFrame',        [0], [0], [dist]),
    propCFrame(1, 'Focus',         [0], [0], [0]),
    propString( 2, 'Name',         pixels.map(function(){ return 'p'; })),
    propBool(   2, 'Anchored',     pixels.map(function(){ return true; })),
    propBool(   2, 'CastShadow',   pixels.map(function(){ return false; })),
    propEnum(   2, 'Material',     pixels.map(function(){ return 272; })),
    propEnum(   2, 'TopSurface',   pixels.map(function(){ return 0; })),
    propEnum(   2, 'BottomSurface',pixels.map(function(){ return 0; })),
    propFloat(  2, 'Transparency', transparencies),
    propVector3(2, 'Size',         pixels.map(function(){ return S; }), pixels.map(function(){ return S; }), pixels.map(function(){ return S; })),
    propCFrame( 2, 'CFrame',       posX, posY, posZ),
    propColor3u8(2,'Color3uint8',  colors),
    makeChunk('PRNT', concat([new Uint8Array([0]), u32LE(childRefs.length), encodeRefs(childRefs), encodeRefs(parentRefs)])),
    makeChunk('END\0', new TextEncoder().encode('</roblox>')),
  ]);
}

async function upload(data, apiKey, userId, name, desc) {
  var form = new FormData();
  form.append("request", JSON.stringify({
    assetType: "Model", displayName: name, description: desc,
    creationContext: { creator: { userId: String(userId) } }
  }));
  form.append("fileContent", new Blob([data], { type: "model/x-rbxm" }), "model.rbxm");
  var res = await fetch("https://api.lithium.wtf/roblox/assets/v1/assets", {
    method: "POST", headers: { "x-api-key": apiKey }, body: form
  });
  var json = await res.json();
  if (!res.ok) throw new Error("upload failed (" + res.status + "): " + JSON.stringify(json));
  if (!json.operationId) throw new Error("no operationid: " + JSON.stringify(json));
  return json.operationId;
}

async function poll(opId, apiKey) {
  for (var i = 0; i < 30; i++) {
    await new Promise(function(r){ setTimeout(r, 2000); });
    log("polling... attempt " + (i+1));
    var res = await fetch("https://api.lithium.wtf/roblox/assets/v1/operations/" + opId, {
      headers: { "x-api-key": apiKey }
    });
    var data = await res.json();
    if (!res.ok) throw new Error("poll failed (" + res.status + "): " + JSON.stringify(data));
    if (data.done) {
      if (data.error) throw new Error("operation error: " + JSON.stringify(data.error));
      return data.response && data.response.assetId;
    }
  }
  throw new Error("timed out after 60s");
}

function saveLibraryEntry(userId, assetId) {
  var key = "library:" + userId;
  var list = [];
  try { var stored = localStorage.getItem(key); if (stored) list = JSON.parse(stored); } catch(e) {}
  if (list.indexOf(String(assetId)) === -1) list.push(String(assetId));
  try { localStorage.setItem(key, JSON.stringify(list)); } catch(e) {}
}

function goToLibrary() {
  var account = (accountSelect.style.display !== "none" && accountSelect.value !== "__new__")
    ? accountSelect.value
    : userIdInput.value.trim();
  if (!account) { log("select or enter an account first"); return; }
  location.href = "/roblox/library?account=" + encodeURIComponent(account);
}

async function run() {
  clearLog();
  var btn = document.querySelectorAll("button")[1];
  btn.disabled = true;
  try {
    var apiKey    = document.getElementById("apiKey").value.trim();
    var userInput = document.getElementById("userId").value.trim();
    var name      = "img";
    var desc      = "generated using lithium's tools";
    var fileInput = document.getElementById("imageFile");
    if (!apiKey)                 throw new Error("api key is required");
    if (!userInput)              throw new Error("username or user id is required");
    if (!fileInput.files.length) throw new Error("please select an image file");
    var userId = await resolveUserId(userInput);
    if (saveCredsCheckbox.checked && accountSelect.style.display === "none") {
      savedAccounts[userInput] = { apiKey: apiKey, userId: userId };
      persistAccounts();
      showAccountDropdown(userInput);
    }
    log("user id: " + userId);
    log("parsing image...");
    var img = await parseImage(await fileInput.files[0].arrayBuffer());
    log("image: " + img.origW + "x" + img.origH + " -> " + img.scaledW + "x" + img.scaledH);
    log("visible pixels: " + img.pixels.length);
    log("building model...");
    var modelData = buildBinary(img.pixels, img.scaledW, img.scaledH, name, desc);
    log("model size: " + (modelData.length / 1024).toFixed(1) + " kb");
    log("uploading...");
    var opId = await upload(modelData, apiKey, userId, name, desc);
    log("uploaded. operation: " + opId);
    log("waiting for roblox...");
    var assetId = await poll(opId, apiKey);
    log("");
    log("done!");
    log("asset id: " + assetId);
    saveLibraryEntry(userId, assetId);
    logEl.appendChild(document.createTextNode("url: "));
    var a = document.createElement("a");
    a.href = "https://www.roblox.com/library/" + assetId;
    a.target = "_blank";
    a.textContent = "https://www.roblox.com/library/" + assetId;
    logEl.appendChild(a);
    logEl.appendChild(document.createTextNode("\n"));
  } catch(e) {
    log("error: " + e.message);
  } finally {
    btn.disabled = false;
  }
}

    </script>
  </section>
</main>
</body>
</html>
