<!DOCTYPE html>
<noscript><meta http-equiv="refresh" content="0; url=https://lithium.wtf/noscript"></noscript>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>lithium's tools</title>
  <link rel="icon" href="https://lithium.wtf/assets/img/icon.png">
  <meta property="og:title" content="lithium's tools">
  <meta property="og:description" content="lithium's tools wow">
  <meta property="og:url" content="https://tools.lithium.wtf/">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://lithium.wtf/assets/img/icon.png">
  <meta property="theme-color" content="#696969">
  <style>
    h1 { font-size: 3rem; margin: 0rem 0; }
    h2 { font-size: 1.5rem; margin: 0.3rem 0; }
    ul { margin: 0rem 0; padding-left: 1.7rem; }
    li { margin: 0rem 0; }
    li span { color: gray; font-size: 0.9rem; }
    p { margin: 0.2rem 0; }
    input, button, select { display: block; margin-bottom: 3px; }
  </style>
</head>
<body>
<header>
  <section id="title">
    <h1>lithium's tools</h1>
  </section>
  <nav>
    <a href="#about">about</a> |
    <a href="#tools">tools</a>
  </nav>
  <hr>
</header>
<main>
  <section id="uploader">
    <h2>lithium's image uploader</h2>
    <div style="display:flex;align-items:center">
      <input type="password" id="apiKey" placeholder="* api key" size="40">
      <select id="accountSelect" style="display:none"></select>
      <button onclick="location.href='/roblox-help'" style="margin-left:3px;width:21px;height:21px;padding:0;cursor:pointer">?</button>
    </div>
    <input type="text" id="userId" placeholder="* username or user id" size="40">
    <label id="saveCredsLabel" style="display:flex;align-items:center;gap:4px;margin-bottom:3px">
      <input type="checkbox" id="saveCreds" style="display:inline;margin:0;width:auto">
      save credentials
    </label>
    <input type="text" id="modelName" placeholder="model name" size="40">
    <input type="text" id="modelDesc" placeholder="description" size="40">
    <select id="format">
      <option value="binary">binary - slower, recommended</option>
      <option value="xml">xml - fast processing, big file</option>
    </select>
    <input type="file" id="imageFile" accept=".png">
    <button onclick="run()" style="cursor:pointer">upload</button>
    <br>
    <pre id="log"></pre>
    <script src="script.js"></script>
  </section>
</main>
</body>
</html>
